<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Premier Life Sciences | SmartResolve{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        premierBlue: "#233893",
                        premierBlueDeep: "#18296e",
                        premierYellow: "#ffbd11",
                    },
                    boxShadow: {
                        shell: "0 28px 70px rgba(24, 38, 89, 0.16)",
                        card: "0 16px 36px rgba(24, 38, 89, 0.10)",
                        soft: "0 10px 24px rgba(24, 38, 89, 0.08)",
                    },
                }
            }
        }
    </script>
    {% block extra_head %}{% endblock %}
</head>
<body class="min-h-screen bg-[linear-gradient(135deg,#dde6fb_0%,#eef3ff_50%,#dce6fb_100%)] text-slate-900">
    {% block body %}{% endblock %}
</body>
</html>
